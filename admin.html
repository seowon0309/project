<!DOCTYPE html>

  function calculateWaitTime(count) {
    if (count === 0) return "0분";

    const waitSeconds = elevatorTripsNeeded * SINGLE_ELEVATOR_INTERVAL;

    return `약 ${waitMinutes}분`;

      body: `${waitingCount},${wait}`
