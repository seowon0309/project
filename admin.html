<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>엘리베이터 카운터 - 관리자용</title>
  <style>
    body { font-family: sans-serif; background: #1e293b; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .video-wrap { position: relative; width: 100%; max-width: 480px; }
    video, canvas#overlay { width: 100%; border-radius: 12px; }
    canvas#overlay { position: absolute; top: 0; left: 0; }
    canvas#buf { display: none; }
    .status { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    .info-box { background: #0f172a; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; width: 100%; max-width: 480px; }
    .btn { margin-top: 12px; padding: 10px 24px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🛠️ 카운터 관리자 모드 (초고속 감지)</h2>
  <div class="video-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>
  <canvas id="buf"></canvas>
  <div class="status" id="status">네트워크 서버 연결 중...</div>
  
  <div class="info-box">
    <p>현재 원격 전송 중인 인원: <strong id="admin-count" style="color:#38bdf8">0</strong>명</p>
    <p>예상 대기 시간: <strong id="admin-wait" style="color:#f43f5e">0.0</strong>분</p>
    <button class="btn" onclick="resetCount()">🔄 인원 초기화</button>
  </div>

<script>
  const CAPACITY_PER_ELEVATOR = 7;
  const SINGLE_ELEVATOR_INTERVAL = 50;
  
  let waitingCount = 0;
  let prevFrame = null, bgFrame = null, frameCount = 0;
  let trackedBlobs = [], nextBlobId = 0, lastCountTime = 0, wakeLock = null;

  const video = document.getElementById("cam"), overlay = document.getElementById("overlay"), buf = document.getElementById("buf");
  const octx = overlay.getContext("2d"), bctx = buf.getContext("2d");

  const TOPIC_URL = "https://ntfy.sh/seowon0309_elevator_secret_channel";

  function calculateWaitTime(count) {
    if (count === 0) return "0.0";
    const secondsPerPerson = SINGLE_ELEVATOR_INTERVAL / CAPACITY_PER_ELEVATOR;
    return ((count * secondsPerPerson) / 60).toFixed(1);
  }

  function sendToServer() {
    const wait = calculateWaitTime(waitingCount);
    document.getElementById("admin-count").innerText = waitingCount;
    document.getElementById("admin-wait").innerText = wait;

    fetch(TOPIC_URL, { method: "POST", body: `${waitingCount},${wait}` })
    .then(() => { if (!wakeLock) document.getElementById("status").innerText = "✅ 원격 서버 연결 성공 (실시간 전송 중)"; })
    .catch(e => console.error("전송 실패:", e));
  }

  function decreaseByOneElevator() {
    if (waitingCount > 0) { waitingCount = Math.max(0, waitingCount - CAPACITY_PER_ELEVATOR); sendToServer(); }
  }
  setInterval(decreaseByOneElevator, SINGLE_ELEVATOR_INTERVAL * 1000);
  sendToServer();

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 } })
  .then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      overlay.width = video.videoWidth; overlay.height = video.videoHeight;
      buf.width = video.videoWidth; buf.height = video.videoHeight;
      requestWakeLock();
      requestAnimationFrame(processFrame);
    };
  }).catch(err => { document.getElementById("status").innerText = "❌ 오류: " + err.message; });

  async function requestWakeLock() {
    try { if ("wakeLock" in navigator) { wakeLock = await navigator.wakeLock.request("screen"); document.getElementById("status").innerText = "✅ 원격 감지 중 (화면 켜짐 고정)"; } } catch (err) {}
  }

  function processFrame() {
    const W = buf.width, H = buf.height, lineX = W / 2;
    bctx.drawImage(video, 0, 0, W, H);
    const curr = bctx.getImageData(0, 0, W, H);
    octx.clearRect(0, 0, W, H);

    octx.strokeStyle = "rgba(56, 189, 248, 0.8)"; octx.lineWidth = 4;
    octx.beginPath(); octx.moveTo(lineX, 0); octx.lineTo(lineX, H); octx.stroke();

    if (prevFrame) {
      frameCount++;
      // [수정] 배경 업데이트 주기를 단축(45->20)하여 빠른 움직임 대비
      if (!bgFrame || frameCount % 20 === 0) bgFrame = prevFrame;
      
      const diff = new Uint8ClampedArray(W * H);
      const pData = bgFrame.data, cData = curr.data;

      for (let i = 0; i < W * H; i++) {
        // 민감도를 50에서 35로 대폭 낮춰 미세한 빠른 잔상도 쫓아가게 변경
        if ((Math.abs(cData[i*4]-pData[i*4]) + Math.abs(cData[i*4+1]-pData[i*4+1]) + Math.abs(cData[i*4+2]-pData[i*4+2])) / 3 > 35) diff[i] = 255;
        else diff[i] = 0;
      }

      const currentBlobs = findBlobsStrict(diff, W, H);
      const nextTrackedBlobs = [];
      const now = Date.now();

      currentBlobs.forEach(blob => {
        octx.strokeStyle = "#facc15"; octx.lineWidth = 3; octx.strokeRect(blob.x, blob.y, blob.w, blob.h);

        let bestMatch = null, minDistance = 150; // 매칭 허용 거리를 80->150으로 대폭 넓혀 빠르게 휙 지나가도 추적 유지

        trackedBlobs.forEach(p => {
          const dist = Math.hypot(p.cx - blob.cx, p.cy - blob.cy);
          if (dist < minDistance) { minDistance = dist; bestMatch = p; }
        });

        if (bestMatch) {
          blob.id = bestMatch.id; blob.startedInLeftZone = bestMatch.startedInLeftZone; blob.isCounted = bestMatch.isCounted;
          const moveX = blob.cx - bestMatch.cx;

          // 선을 통과하는 순간 감지 (마진 완화)
          if (!blob.isCounted && blob.startedInLeftZone && bestMatch.cx < (lineX + 10) && blob.cx >= (lineX - 10)) {
            // 연속 카운트 방지 딜레이 단축 (1200ms -> 600ms) 하여 연속으로 뛰어가도 다 잡게 변경
            if (now - lastCountTime > 600) {
              waitingCount++; blob.isCounted = true; lastCountTime = now;
              flashLine("#34d399"); sendToServer();
            }
          }
        } else {
          blob.id = nextBlobId++; blob.isCounted = false;
          blob.startedInLeftZone = blob.cx < lineX;
        }
        nextTrackedBlobs.push(blob);
      });
      trackedBlobs = nextTrackedBlobs;
    }
    prevFrame = curr;
    requestAnimationFrame(processFrame);
  }

  function findBlobsStrict(diff, W, H) {
    const blobs = []; const step = 8; // 촘촘하게 검사 (12 -> 8)
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        if (diff[y * W + x] === 255) {
          let found = false;
          for (let b of blobs) {
            if (x >= b.x - 30 && x <= b.x + b.w + 30 && y >= b.y - 30 && y <= b.y + b.h + 30) {
              let x1 = Math.min(b.x, x), x2 = Math.max(b.x + b.w, x), y1 = Math.min(b.y, y), y2 = Math.max(b.y + b.h, y);
              b.x = x1; b.y = y1; b.w = x2 - x1; b.h = y2 - y1; b.cx = x1 + b.w / 2; b.cy = y1 + b.h / 2;
              found = true; break;
            }
          }
          if (!found) blobs.push({ x: x, y: y, w: step, h: step, cx: x + step / 2, cy: y + step / 2 });
        }
      }
    }
    // [수정] 최소 덩어리 크기 기준을 완화 (110 -> 60) 하여 빠르게 스쳐 지나가는 인원도 포착하도록 설정
    return blobs.filter(b => b.w > 60 && b.h > 60);
  }

  function flashLine(color) { overlay.style.outline = `8px solid ${color}`; setTimeout(() => overlay.style.outline = "none", 350); }
  function resetCount() { waitingCount = 0; trackedBlobs = []; lastCountTime = 0; sendToServer(); }
</script>
</body>
</html>
