<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>엘리베이터 대기 현황 전광판</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    h1 { margin-bottom: 30px; font-size: 28px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
    .display-container { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 20px; }
    .card { background: #1e293b; border-radius: 24px; padding: 40px 20px; text-align: center; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); border: 1px solid #334155; }
    .label { font-size: 18px; color: #94a3b8; font-weight: 500; margin-bottom: 10px; }
    .number-wrap { display: flex; align-items: baseline; justify-content: center; gap: 8px; }
    .number { font-size: 80px; font-weight: 800; color: #38bdf8; line-height: 1.1; white-space: nowrap; }
    .unit { font-size: 24px; color: #64748b; font-weight: bold; }
    .badge { display: inline-block; padding: 6px 18px; border-radius: 999px; font-size: 16px; font-weight: bold; margin-top: 20px; }
    .badge.low    { background: #14532d; color: #4ade80; }
    .badge.medium { background: #713f12; color: #facc15; }
    .badge.high   { background: #7f1d1d; color: #f87171; }
    #waitTime { color: #f43f5e; font-size: 72px; } /* 모바일에서 글자가 깨지지 않도록 폰트 크기 최적화 */
  </style>
</head>
<body>

  <h1>🛗 엘리베이터 대기 현황</h1>

  <div class="display-container">
    <div class="card">
      <div class="label">현재 대기 인원</div>
      <div class="number-wrap">
        <span class="number" id="count">0</span>
        <span class="unit">명</span>
      </div>
      <div id="badge" class="badge low">여유</div>
    </div>

    <div class="card">
      <div class="label">예상 대기 시간</div>
      <div class="number-wrap">
        <span class="number" id="waitTime">약 0분</span>
      </div>
    </div>
  </div>

<script>
  const STREAM_URL = "https://ntfy.sh/seowon0309_elevator_secret_channel/sse";

  function startListening() {
    const eventSource = new EventSource(STREAM_URL);

    eventSource.onmessage = (event) => {
      try {
        const rawData = JSON.parse(event.data);
        if (rawData && rawData.message) {
          const parts = rawData.message.split(",");
          if(parts.length === 2) {
            const currentCount = parseInt(parts[0]) || 0;
            const currentWait = parts[1] || "0";

            // 1. 대기 인원 화면에 반영
            document.getElementById("count").innerText = currentCount;
            
            // 2. 대기 시간 화면에 반영 (중복 없이 깔끔하게 '약 X분' 형식 지정)
            document.getElementById("waitTime").innerText = "약 " + currentWait + "분";

            // 3. 인원별 혼잡도 배지 변경
            const badge = document.getElementById("badge");
            if (currentCount === 0) {
              badge.className = "badge low"; badge.innerText = "여유";
            } else if (currentCount <= 5) {
              badge.className = "badge medium"; badge.innerText = "보통";
            } else {
              badge.className = "badge high"; badge.innerText = "혼잡";
            }
          }
        }
      } catch (e) {
        console.error("데이터 매핑 실패:", e);
      }
    };

    eventSource.onerror = () => {
      eventSource.close();
      setTimeout(startListening, 1500);
    };
  }

  startListening();
</script>
</body>
</html>
