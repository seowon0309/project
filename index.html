<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>엘리베이터 대기 현황 (일방통행 정밀 버전)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }
    h2 { margin: 16px 0; font-size: 22px; }
    .video-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
    }
    video, canvas#overlay {
      width: 100%;
      border-radius: 12px;
    }
    canvas#overlay {
      position: absolute;
      top: 0; left: 0;
    }
    canvas#buf { display: none; }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin: 12px 0;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .number { font-size: 72px; font-weight: bold; color: #38bdf8; line-height: 1; }
    .label  { font-size: 16px; color: #94a3b8; margin-top: 8px; }
    .status { font-size: 13px; color: #64748b; margin-top: 16px; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin-top: 12px;
    }
    .badge.low    { background: #166534; color: #86efac; }
    .badge.medium { background: #854d0e; color: #fde68a; }
    .badge.high   { background: #7f1d1d; color: #fca5a5; }
    .btn {
      margin-top: 12px;
      padding: 10px 24px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>🛗 엘리베이터 대기 현황 (일방통행 정밀)</h2>

  <div class="video-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>
  <canvas id="buf"></canvas>

  <div class="card">
    <div class="label">현재 대기 인원</div>
    <div class="number" id="count">0</div>
    <div class="label">명</div>
    <div id="badge" class="badge low">여유</div>
  </div>

  <div class="card">
    <div class="label">예상 대기시간</div>
    <div class="number" id="waitTime">0</div>
    <div class="label">분</div>
  </div>

  <button class="btn" onclick="resetCount()">🔄 인원 초기화</button>
  <div class="status" id="status">카메라 시작 중...</div>

<script>
  const ELEVATOR_CYCLE = 2;
  const MAX_CAPACITY   = 10;

  let waitingCount = 0;
  let prevFrame = null;
  let bgFrame   = null;
  let frameCount = 0;
  
  // 객체 추적 배열
  let trackedBlobs = []; 
  let nextBlobId = 0;
  let lastCountTime = 0;

  const video   = document.getElementById("cam");
  const overlay = document.getElementById("overlay");
  const buf     = document.getElementById("buf");
  const octx    = overlay.getContext("2d");
  const bctx    = buf.getContext("2d");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: 640, height: 480 }
  }).then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      overlay.width  = video.videoWidth;
      overlay.height = video.videoHeight;
      buf.width      = video.videoWidth;
      buf.height     = video.videoHeight;
      document.getElementById("status").innerText = "✅ 방향성 필터링 분석 중...";
      requestAnimationFrame(processFrame);
    };
  }).catch(err => {
    document.getElementById("status").innerText = "❌ 카메라 오류: " + err.message;
  });

  function processFrame() {
    const W = buf.width;
    const H = buf.height;
    const lineX = W / 2; // 중앙 기준선

    bctx.drawImage(video, 0, 0, W, H);
    const curr = bctx.getImageData(0, 0, W, H);
    octx.clearRect(0, 0, W, H);

    // 중앙 기준선 시각화 (진입 통과선)
    octx.strokeStyle = "rgba(56, 189, 248, 0.8)";
    octx.lineWidth   = 4;
    octx.beginPath();
    octx.moveTo(lineX, 0);
    octx.lineTo(lineX, H);
    octx.stroke();

    if (prevFrame) {
      frameCount++;

      // 조명 변화 자동 차단 및 동적 업데이트 안정화
      if (!bgFrame || frameCount % 45 === 0) {
        bgFrame = prevFrame;
      }
     
      const diff  = new Uint8ClampedArray(W * H);
      const pData = bgFrame.data;
      const cData = curr.data;
      
      for (let i = 0; i < W * H; i++) {
        const r = Math.abs(cData[i*4]   - pData[i*4]);
        const g = Math.abs(cData[i*4+1] - pData[i*4+1]);
        const b = Math.abs(cData[i*4+2] - pData[i*4+2]);
        
        // 잔상 및 미세 떨림 픽셀 완벽 필터링 (임계값 상향)
        if ((r + g + b) / 3 > 50) {
          diff[i] = 255;
        } else {
          diff[i] = 0;
        }
      }

      const currentBlobs = findBlobsStrict(diff, W, H);
      const nextTrackedBlobs = [];
      const now = Date.now();

      currentBlobs.forEach(blob => {
        // 감지된 객체 테두리 그리기
        octx.strokeStyle = "#facc15";
        octx.lineWidth   = 3;
        octx.strokeRect(blob.x, blob.y, blob.w, blob.h);

        let bestMatch = null;
        let minDistance = 80; // 프레임 간 추적 유효 거리

        trackedBlobs.forEach(p => {
          const dist = Math.hypot(p.cx - blob.cx, p.cy - blob.cy);
          if (dist < minDistance) {
            minDistance = dist;
            bestMatch = p;
          }
        });

        if (bestMatch) {
          // 이전 프레임의 속성(고유 ID, 태어난 위치, 카운트 완료 여부)을 그대로 상속
          blob.id = bestMatch.id;
          blob.startedInLeftZone = bestMatch.startedInLeftZone;
          blob.isCounted = bestMatch.isCounted;

          // 실시간 프레임 이동 벡터 계산
          const moveX = blob.cx - bestMatch.cx;

          // [핵심 인공지능 조건 검증]
          // 1. 아직 카운트가 안 된 객체여야 함
          // 2. 반드시 "왼쪽 구역"에서 처음 발견되어 움직이기 시작한 객체여야 함 (startedInLeftZone === true)
          // 3. 현재 중심점(cx)이 중앙선(lineX)을 넘어서 오른쪽 구역으로 진입해야 함
          // 4. 이동 방향 벡터가 오른쪽을 향하고 있어야 함 (moveX > 0)
          // 5. 연속 중복 인식을 막기 위해 마지막 카운트 발생 후 1.2초의 쿨타임 검증
          if (!blob.isCounted && blob.startedInLeftZone && bestMatch.cx < lineX && blob.cx >= lineX && moveX > 0) {
            if (now - lastCountTime > 1200) {
              waitingCount++;
              blob.isCounted = true;
              lastCountTime = now;
              flashLine("#34d399"); // 성공 시 초록색 화면 플래시
            }
          }
        } else {
          // 화면에 완전히 새로 나타난 객체인 경우 처리
          blob.id = nextBlobId++;
          blob.isCounted = false;
          
          // [방향 차단 핵심] 사물이 처음 등장한 순간의 위치가 중앙선보다 왼쪽인지 기록합니다.
          // 선 바로 옆에서 생성되어 흔들리는 노이즈를 막기 위해 마진(-15px)을 둡니다.
          if (blob.cx < lineX - 15) {
            blob.startedInLeftZone = true;  // 왼쪽 출발 인정 (카운트 대상)
          } else {
            blob.startedInLeftZone = false; // 오른쪽 혹은 선 위에서 생성됨 (반대 방향이므로 카운트 제외)
          }
        }

        nextTrackedBlobs.push(blob);
      });

      trackedBlobs = nextTrackedBlobs;
      updateUI();
    }

    prevFrame = curr;
    requestAnimationFrame(processFrame);
  }

  // 노이즈 차단 성능을 극대화한 블롭 추출 알고리즘
  function findBlobsStrict(diff, W, H) {
    const blobs = [];
    const step = 12; // 연산 그리드를 넓혀 미세한 노이즈 도트 파편 무시
    
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        if (diff[y * W + x] === 255) {
          let found = false;
          for (let b of blobs) {
            // 파편화된 조각들이 엉뚱하게 결합하지 않도록 반경 최적화
            if (x >= b.x - 20 && x <= b.x + b.w + 20 &&
                y >= b.y - 20 && y <= b.y + b.h + 20) {
              
              let x1 = Math.min(b.x, x);
              let x2 = Math.max(b.x + b.w, x);
              let y1 = Math.min(b.y, y);
              let y2 = Math.max(b.y + b.h, y);
              
              b.x = x1; b.y = y1;
              b.w = x2 - x1; b.h = y2 - y1;
              b.cx = x1 + b.w / 2;
              b.cy = y1 + b.h / 2;
              found = true;
              break;
            }
          }
          if (!found) {
            blobs.push({ x: x, y: y, w: step, h: step, cx: x + step/2, cy: y + step/2 });
          }
        }
      }
    }
    
    // 크기 컷트라인을 대폭 올려 손동작, 그림자, 카메라 흔들림 노이즈 완전 제거
    // 확실하게 몸집이 잡히는 사람 형태만 추적 대상 링에 올립니다.
    return blobs.filter(b => b.w > 110 && b.h > 110);
  }

  function flashLine(color) {
    overlay.style.outline = `8px solid ${color}`;
    setTimeout(() => overlay.style.outline = "none", 350);
  }

  function updateUI() {
    const trips = Math.ceil(waitingCount / MAX_CAPACITY);
    const wait  = waitingCount === 0 ? 0 : (trips * ELEVATOR_CYCLE).toFixed(1);

    document.getElementById("count").innerText    = waitingCount;
    document.getElementById("waitTime").innerText = wait;

    const badge = document.getElementById("badge");
    if (waitingCount === 0)     { badge.className = "badge low";    badge.innerText = "여유"; }
    else if (waitingCount <= 5) { badge.className = "badge medium"; badge.innerText = "보통"; }
    else                        { badge.className = "badge high";   badge.innerText = "혼잡"; }
  }

  function resetCount() {
    waitingCount = 0;
    trackedBlobs = [];
    lastCountTime = 0;
    updateUI();
  }
</script>
</body>
</html>
